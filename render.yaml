services:
  - type: web
    name: notebeatkids-api
    runtime: node
    buildCommand: npm install && sh build.sh
    startCommand: NODE_ENV=production node dist/server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
    healthCheckPath: /health
