<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>NoteBeat Kids - Learn Music Through Play</title>
    <meta name="description" content="NoteBeat Kids is a fun and interactive music education platform that teaches rhythm reading and note recognition to children ages 6-10." />
    <meta name="theme-color" content="#764ba2" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NoteBeat Kids" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,700&family=Nunito+Sans:wght@400;600;700;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,700&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"></noscript>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: #0f0c29; }
      #root { min-height: 100vh; min-height: 100dvh; background: #0f0c29; }

      /* ── Splash screen ── */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(160deg, #1a1040 0%, #2d1b69 40%, #764ba2 100%);
        transition: opacity 0.4s ease;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }

      #splash-title {
        font-size: 2rem;
        font-weight: 900;
        color: #fff;
        letter-spacing: -0.5px;
        margin-bottom: 6px;
        font-family: 'Nunito', system-ui, sans-serif;
      }
      #splash-sub {
        font-size: 0.9rem;
        color: rgba(255,255,255,0.65);
        font-family: 'Nunito', system-ui, sans-serif;
        margin-bottom: 40px;
      }
      #splash-spinner {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 4px solid rgba(255,255,255,0.2);
        border-top-color: rgba(255,255,255,0.85);
        animation: spin 0.75s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* floating notes */
      #splash-notes {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }
      .snote {
        position: absolute;
        font-size: 1.6rem;
        color: rgba(255,255,255,0.12);
        animation: floatNote 5s ease-in-out infinite;
      }
      @keyframes floatNote {
        0%   { transform: translateY(0)   rotate(0deg);   opacity: 0.08; }
        50%  { transform: translateY(-18px) rotate(12deg); opacity: 0.18; }
        100% { transform: translateY(0)   rotate(0deg);   opacity: 0.08; }
      }
    </style>
  </head>
  <body>
    <!-- Splash screen: pure HTML/CSS, visible before React loads -->
    <div id="splash">
      <div id="splash-notes">
        <span class="snote" style="left:8%;top:15%;animation-delay:0s">♩</span>
        <span class="snote" style="left:88%;top:10%;animation-delay:0.6s">♪</span>
        <span class="snote" style="left:20%;top:75%;animation-delay:1.2s">♫</span>
        <span class="snote" style="left:72%;top:70%;animation-delay:0.3s">♬</span>
        <span class="snote" style="left:50%;top:8%;animation-delay:0.9s">𝄞</span>
        <span class="snote" style="left:5%;top:50%;animation-delay:1.5s">♭</span>
        <span class="snote" style="left:93%;top:45%;animation-delay:0.4s">♯</span>
      </div>
      <div id="splash-title">🎵 NoteBeat Kids</div>
      <div id="splash-sub">Müzikle Öğren, Eğlenerek Büyü!</div>
      <div id="splash-spinner"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
